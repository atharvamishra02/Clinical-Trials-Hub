services:
  # Backend API – must be a "web" service so Render gives it a public URL
  - type: web
    name: clinical-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: ohio
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false # Set this in the Render dashboard
      - key: DB_HOST
        value: aact-db.ctti-clinicaltrials.org
      - key: DB_PORT
        value: "5432"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: aact

  # Frontend – Vite/React served by nginx
  - type: web
    name: clinical-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    region: ohio
    plan: free
    envVars:
      # Point nginx proxy to the backend's Render URL
      # After deploying backend, get its URL from Render dashboard and set here
      - key: BACKEND_URL
        sync: false # Set to: https://clinical-backend.onrender.com
