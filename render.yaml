services:
  # Backend API
  - type: web
    name: clinical-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: ohio
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false # Set in Render dashboard
      - key: DB_HOST
        value: aact-db.ctti-clinicaltrials.org
      - key: DB_PORT
        value: "5432"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: aact

  # Frontend – React static site served by nginx
  - type: web
    name: clinical-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    region: ohio
    plan: free
    envVars:
      # This gets baked into the JS bundle at build time
      - key: VITE_API_URL
        value: https://clinical-backend.onrender.com/api
